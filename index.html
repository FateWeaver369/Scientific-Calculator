<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <select id="theme">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="neon">Neon</option>
    </select>

    <button onclick="toggleAngle()">DEG</button>
  </div>

  <!-- DISPLAY -->
  <div class="display">
    <div id="history-preview"></div>
    <input id="screen" readonly />
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- BUTTONS -->
    <div class="buttons">

      <button onclick="clearAll()">AC</button>
      <button onclick="del()">DEL</button>
      <button onclick="append('(')">(</button>
      <button onclick="append(')')">)</button>

      <button onclick="func('sin')">sin</button>
      <button onclick="func('cos')">cos</button>
      <button onclick="func('tan')">tan</button>
      <button onclick="append('/')">÷</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('*')">×</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('-')">−</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="append('+')">+</button>

      <button onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button onclick="append('Math.PI')">π</button>
      <button onclick="calculate()">=</button>

      <button onclick="append('Math.sqrt(')">√</button>
      <button onclick="append('**2')">x²</button>
      <button onclick="append('Math.log10(')">log</button>
      <button onclick="append('Math.log(')">ln</button>

    </div>

    <!-- HISTORY -->
    <div class="history" id="history"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
